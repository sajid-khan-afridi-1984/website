<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kitty Typing Rescue</title>
<style>
:root{--ink:#23304a;--purple:#7567e8;--deep:#5848c7;--sun:#ffd86b;--danger:#ff637d;--shadow:0 10px 28px #23304a24}*{box-sizing:border-box}body{margin:0;min-height:100vh;overflow:hidden;color:var(--ink);font-family:"Trebuchet MS",Arial,sans-serif;background:linear-gradient(#9fe0ff 0 62%,#bce6b9 62%,#8fd18e)}button,input{font:inherit}.app{width:min(1100px,100%);height:100vh;margin:auto;padding:14px;display:grid;grid-template-rows:auto 1fr auto;gap:10px}.top{display:grid;grid-template-columns:repeat(4,1fr) auto;gap:10px}.stat,.sound{background:#fffffff0;border:3px solid #fff;border-radius:18px;box-shadow:var(--shadow);text-align:center}.stat{padding:7px 10px}.label{display:block;font-size:.7rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;opacity:.65}.value{font-size:1.25rem;font-weight:1000}.sound{min-width:54px;border:0;font-size:1.35rem;cursor:pointer}.game{position:relative;min-height:0;border:5px solid #fff;border-radius:28px;overflow:hidden;box-shadow:var(--shadow);background:linear-gradient(#ffffff33,#ffffff05),repeating-linear-gradient(90deg,transparent 0 84px,#ffffff14 85px 86px)}#field{position:absolute;inset:0;overflow:hidden}.line{position:absolute;left:0;right:0;bottom:80px;border-top:4px dashed #ff637d94}.line:after{content:"TYPE IT!";position:absolute;right:12px;top:-29px;padding:4px 9px;border-radius:10px 10px 0 0;color:#fff;background:#ff637dd1;font-size:.72rem;font-weight:1000;letter-spacing:.08em}.word{position:absolute;left:0;top:0;padding:8px 14px 9px;border:3px solid #fff;border-radius:16px;background:linear-gradient(#fff,#f4f0ff);box-shadow:0 7px 0 #5848c733,0 10px 18px #23304a1f;color:var(--deep);font-size:clamp(1.15rem,2.5vw,1.7rem);font-weight:1000;white-space:nowrap;user-select:none}.word.match{border-color:var(--sun);background:#fff8cf;color:#9a6c00}.word.pop{animation:pop .28s forwards}@keyframes pop{50%{scale:1.35;rotate:-4deg}to{scale:0;opacity:0}}.mascot{position:absolute;left:14px;bottom:88px;z-index:4;display:flex;align-items:flex-end;gap:8px;pointer-events:none}.cat{width:clamp(86px,10vw,118px);filter:drop-shadow(0 7px 3px #23304a2b);transform-origin:bottom}.cat.cheer{animation:cheer .55s}.cat.sad{animation:sad .55s}@keyframes cheer{35%{transform:translateY(-23px) rotate(-9deg) scale(1.08)}70%{transform:translateY(-8px) rotate(8deg)}}@keyframes sad{25%{transform:translateX(-6px) rotate(-5deg)}75%{transform:translateX(6px) rotate(5deg)}}.bubble{max-width:180px;margin-bottom:35px;padding:9px 12px;border-radius:15px 15px 15px 3px;background:#fff;box-shadow:0 7px 18px #23304a26;font-weight:900;opacity:0;transform:translateY(7px);transition:.18s}.bubble.show{opacity:1;transform:none}.inputbar{position:absolute;left:0;right:0;bottom:0;height:80px;z-index:5;display:grid;place-items:center;padding:10px;background:#fffffff0;border-top:4px solid #ffffffd9}.wrap{position:relative;width:min(620px,82%)}input{width:100%;padding:13px 52px 13px 18px;border:4px solid #c7bfff;outline:0;border-radius:18px;background:#fff;color:var(--ink);font-size:clamp(1.15rem,3vw,1.6rem);font-weight:1000;text-align:center}input:focus{border-color:var(--purple)}input.good{border-color:#49bf75}input.bad{border-color:var(--danger);animation:shake .2s}@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}.kbd{position:absolute;right:15px;top:50%;translate:0 -50%;font-size:1.4rem;opacity:.55}.overlay{position:absolute;inset:0;z-index:10;display:grid;place-items:center;padding:18px;background:#4d469b45;backdrop-filter:blur(8px)}.hidden{display:none}.card{width:min(520px,100%);padding:26px;text-align:center;border:5px solid #fff;border-radius:28px;background:linear-gradient(#fff,#f8f5ff);box-shadow:0 22px 60px #23304a3d}.bigcat{width:122px;margin:auto;animation:bob 1.8s ease-in-out infinite}@keyframes bob{50%{transform:translateY(-8px) rotate(2deg)}}h1{margin:10px 0 6px;color:var(--deep);font-size:clamp(2rem,6vw,3rem);line-height:.98}.card p{margin:10px auto 18px;max-width:390px;font-size:1.08rem;line-height:1.4;font-weight:800}.primary{border:0;border-radius:18px;padding:14px 24px;color:#fff;background:linear-gradient(#897cf4,#6555d5);box-shadow:0 7px 0 #493ba8;font-size:1.2rem;font-weight:1000;cursor:pointer}.banner{position:absolute;left:50%;top:42%;z-index:8;translate:-50% -50%;padding:16px 28px;border:5px solid #fff;border-radius:22px;background:linear-gradient(#ffe481,#ffc944);box-shadow:0 10px 0 #a9730047;color:#765000;font-size:clamp(1.8rem,5vw,3.2rem);font-weight:1000;opacity:0;pointer-events:none}.banner.show{animation:level 1.25s}@keyframes level{20%,72%{opacity:1;scale:1}0%{scale:.5}to{opacity:0;translate:-50% -70%;scale:1.12}}.hint{text-align:center;margin:0;font-size:.84rem;font-weight:800;opacity:.72}.cat-svg{--fur:#f49a28;--dark:#d97916;--line:#5a341f;width:100%;height:auto;display:block}.fur{fill:var(--fur)}.dark{fill:var(--dark)}.ear{fill:#ffd4c6}.muzzle{fill:#fff7ef}.eye{fill:var(--line)}.nose{fill:#ff8ca5}.stroke{fill:none;stroke:var(--line);stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round}.blush{fill:#ffb1c4;opacity:.8}@media(max-width:680px){.app{padding:8px}.top{gap:5px}.stat{padding:5px 2px}.label{font-size:.55rem}.value{font-size:1rem}.sound{min-width:42px}.bubble{display:none}.wrap{width:94%}.game{border-radius:20px;border-width:3px}}
</style>
</head>
<body>
<main class="app">
<section class="top"><div class="stat"><span class="label">Score</span><span class="value" id="score">0</span></div><div class="stat"><span class="label">Level</span><span class="value" id="level">1</span></div><div class="stat"><span class="label">Streak</span><span class="value" id="streak">0 🔥</span></div><div class="stat"><span class="label">Lives</span><span class="value" id="lives">❤️❤️❤️</span></div><button class="sound" id="sound">🔊</button></section>
<section class="game"><div id="field"></div><div class="line"></div><div class="mascot"><div class="cat" id="cat"><svg class="cat-svg" viewBox="0 0 120 120" aria-hidden="true"><path class="fur" d="M26 42 39 17 54 37h12l15-20 13 25v31c0 17-15 30-34 30S26 90 26 73Z"/><ellipse class="fur" cx="43" cy="97" rx="10" ry="6"/><ellipse class="fur" cx="77" cy="97" rx="10" ry="6"/><path class="ear" d="m38 25 7 13H32Zm44 0-7 13h13Z"/><ellipse class="muzzle" cx="60" cy="69" rx="22" ry="16"/><circle class="eye" cx="48" cy="56" r="4"/><circle class="eye" cx="72" cy="56" r="4"/><path class="nose" d="m60 63-5 5h10Z"/><path class="stroke" d="M60 69c-3 4-7 6-11 6m11-6c3 4 7 6 11 6M39 66H22m17 6H20m61-6h17m-17 6h19M60 36v10m-9-6-5 8m23-8 5 8"/><circle class="blush" cx="37" cy="69" r="5"/><circle class="blush" cx="83" cy="69" r="5"/><path class="dark" d="m60 22 3 9h-6Z"/></svg></div><div class="bubble" id="bubble">You can do it!</div></div><div class="banner" id="banner">LEVEL 2!</div><div class="inputbar"><div class="wrap"><input id="input" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="Type a word…" disabled><span class="kbd">⌨️</span></div></div>
<div class="overlay" id="start"><div class="card"><div class="bigcat"><svg class="cat-svg" viewBox="0 0 120 120"><path class="fur" d="M26 42 39 17 54 37h12l15-20 13 25v31c0 17-15 30-34 30S26 90 26 73Z"/><path class="ear" d="m38 25 7 13H32Zm44 0-7 13h13Z"/><ellipse class="muzzle" cx="60" cy="69" rx="22" ry="16"/><circle class="eye" cx="48" cy="56" r="4"/><circle class="eye" cx="72" cy="56" r="4"/><path class="nose" d="m60 63-5 5h10Z"/><path class="stroke" d="M60 69c-3 4-7 6-11 6m11-6c3 4 7 6 11 6M39 66H22m17 6H20m61-6h17m-17 6h19"/><circle class="blush" cx="37" cy="69" r="5"/><circle class="blush" cx="83" cy="69" r="5"/></svg></div><h1>Kitty Typing Rescue</h1><p>Type each falling word before it reaches the red line. Save words, build a streak, and help Kitty cheer!</p><button class="primary" id="go">Start Game</button></div></div>
<div class="overlay hidden" id="end"><div class="card"><div class="bigcat">😺</div><h1 id="title">Great job!</h1><p id="result"></p><button class="primary" id="again">Play Again</button></div></div></section><p class="hint">Type the whole word. It is caught automatically — no Enter key needed.</p></main>
<script>
(()=>{'use strict';const banks=[["cat","dog","sun","hat","run","red","big","cup","map","bed","fox","hop","jam","pig","top","box"],["fish","moon","star","frog","duck","tree","book","milk","ball","cake","rain","bird","sock","boat","kite","bear"],["apple","happy","green","chair","house","smile","water","tiger","bread","plant","mouse","cloud","train","pizza"],["rabbit","yellow","pencil","kitten","rocket","garden","window","purple","school","planet","jungle","cookie"],["dolphin","rainbow","blanket","monster","sandwich","penguin","sunshine","cupcake","dinosaur","treasure"]],cheers=["Purr-fect!","Great typing!","You got it!","Super paws!","Meow-velous!","Nice save!"],misses=["Almost!","Try the next one!","You’ve got this!"];const $=id=>document.getElementById(id),E={field:$("field"),input:$("input"),score:$("score"),level:$("level"),streak:$("streak"),lives:$("lives"),cat:$("cat"),bubble:$("bubble"),banner:$("banner"),start:$("start"),end:$("end"),title:$("title"),result:$("result"),sound:$("sound")};let words=[],score=0,level=1,streak=0,lives=3,caught=0,running=false,last=0,spawn=0,raf,sound=true,audio,timer,id=0;const pick=a=>a[Math.floor(Math.random()*a.length)],speed=()=>34+(level-1)*8,gap=()=>Math.max(1050,2200-(level-1)*160);function beep(f=520,d=.08,t='sine'){if(!sound)return;try{audio||=new(AudioContext||webkitAudioContext);let o=audio.createOscillator(),g=audio.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(.0001,audio.currentTime);g.gain.exponentialRampToValueAtTime(.12,audio.currentTime+.01);g.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+d);o.connect(g).connect(audio.destination);o.start();o.stop(audio.currentTime+d+.02)}catch{}}function hud(){E.score.textContent=score;E.level.textContent=level;E.streak.textContent=streak+' 🔥';E.lives.textContent='❤️'.repeat(lives)+'🖤'.repeat(3-lives)}function say(t){clearTimeout(timer);E.bubble.textContent=t;E.bubble.classList.add('show');timer=setTimeout(()=>E.bubble.classList.remove('show'),1050)}function cat(k){E.cat.className='cat';void E.cat.offsetWidth;E.cat.classList.add(k)}function render(w){w.el.style.transform=`translate(${w.x}px,${w.y}px) translate(-50%,-50%)${w.el.classList.contains('match')?' scale(1.08)':''}`}function add(force=false){if(!running||(!force&&words.length>=Math.min(3+Math.floor(level/2),6)))return;let text=pick(banks[Math.min(level-1,banks.length-1)]),el=document.createElement('div');el.className='word';el.textContent=text;E.field.appendChild(el);let w={id:++id,text,el,x:(E.field.clientWidth<520?70:150)+Math.random()*Math.max(20,E.field.clientWidth-(E.field.clientWidth<520?145:225)),y:-30,v:speed()*(.9+Math.random()*.18)};words.push(w);render(w)}function prefixes(){let t=E.input.value.trim().toLowerCase(),ok=!t;words.forEach(w=>{let m=t&&w.text.startsWith(t);w.el.classList.toggle('match',m);if(m)ok=true;render(w)});E.input.classList.toggle('bad',!!t&&!ok)}function win(w){let i=words.findIndex(x=>x.id===w.id);if(i<0)return;words.splice(i,1);w.el.classList.add('pop');streak++;score+=10+Math.min(streak,10);caught++;E.input.value='';E.input.classList.remove('bad');E.input.classList.add('good');setTimeout(()=>E.input.classList.remove('good'),160);beep(520,.08,'triangle');setTimeout(()=>beep(700,.1,'triangle'),70);cat('cheer');say(pick(cheers));hud();setTimeout(()=>w.el.remove(),290);if(caught>=7){caught=0;level++;E.banner.textContent='LEVEL '+level+'!';E.banner.className='banner';void E.banner.offsetWidth;E.banner.classList.add('show');words.forEach(x=>x.v*=1.12);hud();say('Faster now!')}}function lose(w){let i=words.findIndex(x=>x.id===w.id);if(i>=0)words.splice(i,1);w.el.remove();lives--;streak=0;beep(180,.16,'sawtooth');cat('sad');say(pick(misses));hud();if(lives<=0)finish()}function loop(t){if(!running)return;if(!last)last=t;let dt=Math.min((t-last)/1000,.04);last=t;if(!spawn||t-spawn>=gap()){add();spawn=t}[...words].forEach(w=>{w.y+=w.v*dt;render(w);if(w.y>=E.field.clientHeight-74)lose(w)});raf=requestAnimationFrame(loop)}function start(){cancelAnimationFrame(raf);words.forEach(w=>w.el.remove());words=[];score=0;level=1;streak=0;lives=3;caught=0;running=true;last=spawn=0;E.input.value='';E.input.disabled=false;E.start.classList.add('hidden');E.end.classList.add('hidden');hud();say('Let’s type!');add(true);E.input.focus();raf=requestAnimationFrame(loop)}function finish(){running=false;cancelAnimationFrame(raf);E.input.disabled=true;words.forEach(w=>w.el.remove());words=[];E.title.textContent=score>=300?'Typing superstar!':score>=160?'Fantastic typing!':score>=80?'Great job!':'Nice try!';E.result.textContent=`You scored ${score} points and reached level ${level}.`;E.end.classList.remove('hidden')}E.input.addEventListener('input',()=>{let t=E.input.value.trim().toLowerCase(),m=words.filter(w=>w.text===t).sort((a,b)=>b.y-a.y);m.length?win(m[0]):prefixes()});$("go").onclick=start;$("again").onclick=start;E.sound.onclick=()=>{sound=!sound;E.sound.textContent=sound?'🔊':'🔇';if(sound)beep();E.input.focus()};document.addEventListener('click',e=>{if(running&&!e.target.closest('button'))E.input.focus()});hud()})();
</script>
</body>
</html>
